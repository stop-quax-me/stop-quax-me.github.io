<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Video Player </title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: Arial, Helvetica, sans-serif; 
            background: #111; /* Warna gelap agar video lebih menonjol */
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* Judul */
        .video-title { 
            font-size: 1.2rem; 
            font-weight: 600; 
            margin-bottom: 16px; 
            text-align: center;
        }

        /* Container Video */
        .video-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 400px; /* Ukuran ideal HP di desktop */
            aspect-ratio: 9 / 16; 
            background: #000; 
            border-radius: 16px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block; 
        }

        /* Sembunyikan tombol fullscreen jika diinginkan */
        video::-webkit-media-controls-fullscreen-button { display: none !important; }
        video::-webkit-media-controls-picture-in-picture-button { display: none !important; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .video-wrapper { border-radius: 12px; }
        }
    </style>
</head>
<body>

    <div class="video-title"> Lol what's the secret to her speed? 🤣🔥 </div>

    <div class="video-wrapper">
        <video 
            autoplay 
            loop 
            muted 
            playsinline 
            controls 
            controlsList="nodownload noremoteplayback nofullscreen" 
            disablePictureInPicture
        >
            <source src="https://cdn2.videy.co/YuRt4Eow1.mp4">
            Browser kamu tidak mendukung pemutar video.
        </video>
    </div>

</body>
</html>
